<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahwissa | Mot de passe oublié</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sky-bg">
  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="plane plane-1">✈️</div>
  <div class="plane plane-2">🛩️</div>
  <div class="particles" id="particles"></div>

  <div class="auth-page">
    <div class="auth-container">
      <!-- Step 1: Email -->
      <div class="auth-card" id="step1">
        <div class="auth-header">
          <div style="width:72px;height:72px;background:linear-gradient(135deg,rgba(21,101,192,0.1),rgba(124,77,255,0.1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;">🔑</div>
          <h2>Mot de passe oublié ?</h2>
          <p>Entrez votre email pour recevoir un code de vérification</p>
        </div>

        <form onsubmit="return showStep2(event)">
          <div class="form-group">
            <label for="email">Adresse Email</label>
            <div style="position:relative;">
              <i class="fas fa-envelope form-icon" style="top:50%;transform:translateY(-50%);"></i>
              <input type="email" id="email" class="form-input" placeholder="votre@email.com" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">
            <i class="fas fa-paper-plane"></i> Envoyer le Code
          </button>
        </form>

        <div class="auth-footer">
          <a href="login.html"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
        </div>
      </div>

      <!-- Step 2: Code -->
      <div class="auth-card" id="step2" style="display:none;">
        <div class="auth-header">
          <div style="width:72px;height:72px;background:linear-gradient(135deg,rgba(0,200,83,0.1),rgba(0,230,118,0.1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;">📧</div>
          <h2>Vérification</h2>
          <p>Entrez le code envoyé à votre email</p>
        </div>

        <form onsubmit="return showStep3(event)">
          <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;">
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" oninput="moveNext(this)" required>
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" oninput="moveNext(this)" required>
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" oninput="moveNext(this)" required>
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" oninput="moveNext(this)" required>
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" oninput="moveNext(this)" required>
            <input type="text" maxlength="1" class="form-input" style="width:52px;height:56px;text-align:center;font-size:1.4rem;font-weight:700;padding:0;" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">
            <i class="fas fa-check-circle"></i> Vérifier
          </button>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted);">
            Pas reçu ? <a href="#" onclick="resendCode()" style="color:var(--primary);text-decoration:none;font-weight:600;">Renvoyer le code</a>
          </p>
        </form>
      </div>

      <!-- Step 3: New Password -->
      <div class="auth-card" id="step3" style="display:none;">
        <div class="auth-header">
          <div style="width:72px;height:72px;background:linear-gradient(135deg,rgba(124,77,255,0.1),rgba(179,136,255,0.1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;">🔒</div>
          <h2>Nouveau Mot de Passe</h2>
          <p>Choisissez un nouveau mot de passe sécurisé</p>
        </div>

        <form onsubmit="return handleReset(event)">
          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe</label>
            <div style="position:relative;">
              <i class="fas fa-lock form-icon" style="top:50%;transform:translateY(-50%);"></i>
              <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 caractères" required minlength="8">
              <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmNew">Confirmer</label>
            <div style="position:relative;">
              <i class="fas fa-shield-alt form-icon" style="top:50%;transform:translateY(-50%);"></i>
              <input type="password" id="confirmNew" class="form-input" placeholder="Retapez le mot de passe" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">
            <i class="fas fa-save"></i> Réinitialiser
          </button>
        </form>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <a href="index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;">
          <i class="fas fa-arrow-left"></i> Retour à l'accueil
        </a>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
  else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
function moveNext(el) {
  if (el.value.length === 1 && el.nextElementSibling) el.nextElementSibling.focus();
}
function showStep2(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
  setTimeout(() => {
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    document.getElementById('step2').style.animation = 'fadeInUp 0.5s ease-out';
  }, 1200);
  return false;
}
function showStep3(e) {
  e.preventDefault();
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
  document.getElementById('step3').style.animation = 'fadeInUp 0.5s ease-out';
  return false;
}
function handleReset(e) {
  e.preventDefault();
  const pw = document.getElementById('newPassword').value;
  const cpw = document.getElementById('confirmNew').value;
  if (pw !== cpw) { alert('Les mots de passe ne correspondent pas !'); return false; }
  const btn = e.target.querySelector('button');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Réinitialisation...';
  setTimeout(() => {
    btn.innerHTML = '<i class="fas fa-check"></i> Succès !';
    btn.style.background = 'linear-gradient(135deg, #00C853, #00E676)';
    setTimeout(() => { window.location.href = 'login.html'; }, 800);
  }, 1500);
  return false;
}
function resendCode() { alert('Code renvoyé avec succès !'); }
</script>
</body>
</html>
