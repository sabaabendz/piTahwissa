<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des événements</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .leaflet-popup-content { margin: 12px 16px; min-width: 180px; }
        .event-popup-title { font-weight: bold; font-size: 14px; color: #0F172A; margin-bottom: 6px; }
        .event-popup-lieu { font-size: 12px; color: #64748B; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = null;
        var pendingMarkers = null;

        function initMapWhenReady() {
            var el = document.getElementById('map');
            if (el.offsetWidth > 0 && el.offsetHeight > 0) {
                map = L.map('map', { preferCanvas: true }).setView([33.5731, 7.5898], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                    maxZoom: 19
                }).addTo(map);
                if (pendingMarkers && pendingMarkers.length) {
                    addLollipopMarkers(pendingMarkers);
                    pendingMarkers = null;
                }
                window.addEventListener('resize', function() {
                    if (map) map.invalidateSize();
                });
                return;
            }
            setTimeout(initMapWhenReady, 50);
        }

        const LOLLIPOP_OFFSET = 0.008;

        function addLollipopMarkers(markers) {
            if (!markers || !markers.length) return;
            if (!map) {
                pendingMarkers = markers;
                return;
            }
            var bounds = [];
            markers.forEach(function(m) {
                if (m.lat == null || m.lng == null) return;
                var base = L.latLng(m.lat, m.lng);
                var top = L.latLng(m.lat + LOLLIPOP_OFFSET, m.lng);
                var stick = L.polyline([base, top], { color: '#9333EA', weight: 2 }).addTo(map);
                var circle = L.circleMarker(top, {
                    radius: 10,
                    fillColor: '#9333EA',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 1
                }).addTo(map);
                var content = '<div class="event-popup-title">' + escapeHtml(m.titre || '') + '</div>' +
                    '<div class="event-popup-lieu">' + escapeHtml(m.lieu || '') + '</div>';
                circle.bindPopup(content);
                stick.bindPopup(content);
                bounds.push(base);
            });
            if (bounds.length) {
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
            }
            setTimeout(function() {
                if (map) {
                    map.invalidateSize();
                    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
                }
            }, 100);
            setTimeout(function() {
                if (map) {
                    map.invalidateSize();
                    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
                }
            }, 500);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refreshMapSize() {
            if (map) map.invalidateSize();
        }

        initMapWhenReady();
    </script>
</body>
</html>
