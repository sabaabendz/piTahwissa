security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Role hierarchy - defines which roles inherit from others
    role_hierarchy:
        ROLE_MANAGER: [ROLE_USER, ROLE_PROJECT_ACCESS]
        ROLE_COLLABORATOR: [ROLE_USER, ROLE_PROJECT_ACCESS]
        ROLE_ADMIN: [ROLE_USER]

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/login$
            stateless: true
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            user_checker: App\Security\UserEnabledChecker
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard_index
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                csrf_token_id: authenticate
            logout:
                path: app_logout
                target: app_login

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        # Public routes
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }  # Homepage
        - { path: ^/users, roles: PUBLIC_ACCESS }  # FrontOffice user listing
        
        # Admin routes - ROLE_ADMIN only
        - { path: ^/admin, roles: ROLE_ADMIN }
        
        # Collaborator CRUD (new/edit/delete specific collaborator) - ROLE_ADMIN only
        - { path: ^/collaborator/new, roles: ROLE_ADMIN }
        - { path: ^/collaborator/\d+/edit, roles: ROLE_ADMIN }
        - { path: ^/collaborator/\d+$, roles: ROLE_ADMIN }
        
        # Manager CRUD - ROLE_ADMIN only
        - { path: ^/manager, roles: ROLE_ADMIN }
        
        # Collaborator network page - ROLE_COLLABORATOR and above
        - { path: ^/collaborator/network, roles: ROLE_COLLABORATOR }
        
        # Collaborator list (My Team for managers) - ROLE_MANAGER and above
        - { path: ^/collaborator$, roles: ROLE_MANAGER }
        
        # Profile - all authenticated users
        - { path: ^/profile, roles: ROLE_USER }
        
        # Dashboard - all authenticated users
        - { path: ^/dashboard, roles: ROLE_USER }
        
        # Projects and Tasks - ROLE_PROJECT_ACCESS only (MANAGER + COLLABORATOR, NOT ADMIN)
        - { path: ^/projet, roles: ROLE_PROJECT_ACCESS }
        - { path: ^/tache, roles: ROLE_PROJECT_ACCESS }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
